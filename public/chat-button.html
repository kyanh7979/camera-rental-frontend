<!-- ================================================
     EVENT LISTENING EXAMPLES
     ================================================ -->

<!--
  // Vanilla JS
  document.addEventListener('chatLauncherClick', function(e) {
    console.log('Chat button clicked at:', e.detail.timestamp);
    openChatModal();
  });

  // Or listen on the element
  window.ChatLauncher.element.addEventListener('chatLauncherClick', function(e) {
    // Handle click
  });

  // React
  useEffect(() => {
    const handleChatClick = () => setIsChatOpen(true);
    document.addEventListener('chatLauncherClick', handleChatClick);
    return () => document.removeEventListener('chatLauncherClick', handleChatClick);
  }, []);

  // Control loading state
  window.ChatLauncher.setLoading(true);  // Show loading ring
  window.ChatLauncher.setLoading(false); // Hide loading ring
-->


<!-- ================================================
     API REFERENCE
     ================================================ -->

<!--
  window.ChatLauncher - Global instance

  Properties:
  - element: The DOM element of the launcher
  - isInitialized: Whether the launcher is initialized

  Methods:
  - setLoading(boolean): Show/hide loading ring
  - destroy(): Remove the launcher from DOM

  Events:
  - 'chatLauncherClick': Fired when button is clicked (not dragged)

  localStorage:
  - Key: 'chat-launcher-position'
  - Value: { x: number, y: number }
-->
